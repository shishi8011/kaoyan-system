<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数学 · 数学系考研</title>

  <!-- KaTeX 渲染引擎 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
          onload="window.__katexReady = true; tryInit()"></script>

  <!-- 数据引擎 -->
  <script src="math_data.js"></script>
  <script src="math_practice.js"></script>

  <!-- 精修：中文衬线 + 英文等宽 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #F7F5F0;
      --header-bg:    #6B8475;
      --header-text:  rgba(255, 255, 255, .95);
      --accent:       #5c7a6e;
      --accent-dark:  #4a6659;
      --accent-light: #e1ebe1;
      --card-bg:      #ffffff;
      --card-border:  #e8e0d0;
      --text:         #2c2c2c;
      --text-soft:    #5c5c5c;
      --muted:        #9a9a8a;
      --year-bg:      #f5e8c7;
      --year-text:    #a08040;
      --score-mint:   #d4ebd4;
      --score-mint-t: #4a7a4a;
      --score-yellow: #f5e8b8;
      --score-yellow-t: #9a7a2a;
      --score-pink:   #f5c8c8;
      --score-pink-t: #a04040;
      --font-serif:   'Noto Serif SC', 'Songti SC', 'Georgia', serif;
      --font-sans:    'Inter', system-ui, -apple-system, 'PingFang SC', sans-serif;
      --shadow-sm:    0 1px 2px rgba(40, 50, 45, .04);
      --shadow-md:    0 2px 4px rgba(40, 50, 45, .04), 0 8px 20px rgba(40, 50, 45, .06);
      --shadow-lg:    0 4px 8px rgba(40, 50, 45, .06), 0 16px 32px rgba(108, 132, 117, .14);
      --ease:         cubic-bezier(.4, 0, .2, 1);
    }

    html, body { height: 100%; }
    body {
      font-family: var(--font-serif);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Top Header ── */
    .topnav {
      background: linear-gradient(180deg, var(--header-bg) 0%, #5d7867 100%);
      color: var(--header-text);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 0 rgba(0, 0, 0, .04), 0 6px 20px rgba(90, 116, 104, .18);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand .logo {
      width: 48px;
      height: 48px;
      background: #ffffff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 3px 10px rgba(0, 0, 0, .14), inset 0 1px 0 rgba(255, 255, 255, .6);
    }
    .brand-text {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: .04em;
      color: var(--header-text);
    }
    .brand small {
      display: block;
      font-size: .72rem;
      opacity: .75;
      font-family: system-ui, sans-serif;
      font-weight: 400;
      margin-top: 2px;
      letter-spacing: .02em;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .nav-btn {
      color: rgba(255, 255, 255, .88);
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, .25);
      padding: 7px 15px;
      border-radius: 8px;
      font-size: .78rem;
      font-family: var(--font-sans);
      font-weight: 500;
      letter-spacing: .02em;
      transition: all .25s var(--ease);
    }
    .nav-btn:hover {
      background: rgba(255, 255, 255, .18);
      border-color: rgba(255, 255, 255, .5);
    }
    .sigma {
      font-size: 2.4rem;
      font-family: 'Times New Roman', 'STIX Two Math', serif;
      font-style: italic;
      color: rgba(255, 255, 255, .7);
      margin-left: 6px;
    }

    /* ── Main Layout ── */
    main {
      flex: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 48px;
      width: 100%;
    }

    /* ── Mode Tabs ── */
    .mode-tabs {
      display: flex;
      gap: 4px;
      background: #ffffff;
      border-radius: 14px;
      padding: 5px;
      width: fit-content;
      margin: 0 auto 22px;
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow-md);
    }
    .mode-tab {
      padding: 9px 24px;
      border: none;
      background: transparent;
      border-radius: 10px;
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: .92rem;
      color: var(--text-soft);
      font-weight: 600;
      transition: all .25s var(--ease);
    }
    .mode-tab:hover { color: var(--accent); }
    .mode-tab.active {
      background: var(--accent);
      color: #ffffff;
      box-shadow: 0 2px 10px rgba(108, 132, 117, .3);
    }

    /* ── Filter Chips ── */
    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
      justify-content: center;
    }
    .chip {
      padding: 6px 14px;
      border-radius: 999px;
      background: var(--accent-light);
      color: var(--accent-dark);
      border: 1px solid transparent;
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: .82rem;
      font-weight: 500;
      transition: all .2s var(--ease);
    }
    .chip:hover {
      background: #d4e4d4;
      border-color: var(--accent);
    }
    .chip.active {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
      box-shadow: 0 3px 10px rgba(108, 132, 117, .28);
    }

    /* ── Card Grid ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 360px));
      gap: 24px;
      justify-content: center;
    }

    .qcard-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Flip Card Structure ── */
    .qcard-flip {
      perspective: 1200px;
    }
    .qcard-inner {
      position: relative;
      width: 100%;
      min-height: 460px;
      transform-style: preserve-3d;
      transition: transform .65s cubic-bezier(.4, 0, .2, 1);
    }
    .qcard-inner.flipped {
      transform: rotateY(180deg);
    }
    .card-face {
      position: absolute;
      inset: 0;
      border: 1px solid transparent;
      border-radius: 18px;
      padding: 26px 28px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      box-shadow:
        0 1px 2px rgba(40, 50, 45, .10),                /* 贴地（短硬） */
        0 3px 6px rgba(108, 132, 117, .14),             /* 近场 */
        0 12px 28px rgba(108, 132, 117, .20),           /* 中场 */
        0 32px 64px rgba(108, 132, 117, .24),           /* 远场柔光 */
        inset 0 1px 0 rgba(255, 255, 255, .65);         /* 顶部内高光 */
      transition: border-color .3s var(--ease),
                  box-shadow .3s var(--ease),
                  transform .3s var(--ease);
    }
    .card-face:hover {
      border-color: var(--accent);
      box-shadow:
        0 2px 3px rgba(40, 50, 45, .12),
        0 6px 12px rgba(108, 132, 117, .20),
        0 20px 40px rgba(108, 132, 117, .28),
        0 48px 84px rgba(108, 132, 117, .34),
        inset 0 1px 0 rgba(255, 255, 255, .75);
    }
    .card-front,
    .card-back  { cursor: pointer; }
    .card-front {
      background: #F2ECE0;           /* 莫兰迪象牙白 */
      border-color: #DFD7C3;
    }
    .card-back  {
      background: #E8EDDD;           /* 莫兰迪雾霾绿（极淡）——比前景只深一点点 */
      border-color: #D6DCC8;
      transform: rotateY(180deg);
    }

    /* ── Front Face ── */
    .qcard-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .year-badge {
      background: linear-gradient(180deg, #F7E9C4 0%, var(--year-bg) 100%);
      color: var(--year-text);
      padding: 3px 12px;
      border-radius: 6px;
      font-size: .78rem;
      font-weight: 700;
      font-family: 'Times New Roman', serif;
      letter-spacing: .02em;
      box-shadow: inset 0 -1px 0 rgba(160, 128, 64, .08);
    }
    .qcard-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag-chip {
      color: #8a8a7a;
      font-size: .72rem;
      font-weight: 500;
      font-family: var(--font-sans);
      letter-spacing: .02em;
    }
    .question {
      flex: 1;
      font-size: 1rem;
      color: var(--text);
      line-height: 1.85;
      overflow-y: auto;
      padding-right: 4px;
    }
    .flip-hint {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #F7F5F0;
      text-align: right;
      color: var(--muted);
      font-size: .82rem;
      font-family: system-ui, sans-serif;
    }

    /* ── Back Face ── */
    .back-answer {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      line-height: 1.85;
      color: var(--text-soft);
      font-size: .95rem;
    }
    .back-answer strong { color: var(--accent-dark); }
    .back-answer table {
      border-collapse: collapse;
      margin: 10px 0;
      font-size: .9rem;
    }
    .back-answer th, .back-answer td {
      border: 1px solid var(--card-border);
      padding: 6px 12px;
    }
    .back-answer th { background: var(--accent-light); color: var(--accent-dark); }
    .question::-webkit-scrollbar,
    .back-answer::-webkit-scrollbar { width: 6px; }
    .question::-webkit-scrollbar-thumb,
    .back-answer::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }

    .flip-hint-back {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--accent-light);
      text-align: left;
      color: var(--muted);
      font-size: .82rem;
      font-family: system-ui, sans-serif;
    }

    /* ── 次级筛选条（小节） ── */
    .filter-chips-secondary {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: -14px;
      margin-bottom: 24px;
      justify-content: center;
    }
    .filter-chips-secondary:empty {
      display: none;
    }
    .filter-chips-secondary .chip {
      font-size: .76rem;
      padding: 4px 12px;
      background: transparent;
      border: 1px solid var(--accent-light);
      color: var(--accent);
    }
    .filter-chips-secondary .chip:hover {
      background: var(--accent-light);
      border-color: var(--accent);
    }
    .filter-chips-secondary .chip.active {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }

    /* ── Chapter / Section Groups (教材模式) ── */
    .chapter-group {
      margin-bottom: 56px;
    }
    .chapter-title {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      color: var(--accent-dark);
      font-weight: 700;
      padding: 10px 0 14px;
      margin-bottom: 28px;
      letter-spacing: .04em;
      position: relative;
    }
    .chapter-title::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent) 35%, var(--accent-light) 75%, transparent 100%);
      border-radius: 2px;
    }
    .section-group {
      margin-bottom: 36px;
    }
    .section-title {
      font-family: var(--font-serif);
      font-size: 1.08rem;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: .02em;
    }
    .section-bar {
      display: inline-block;
      width: 4px;
      height: 20px;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
      border-radius: 2px;
      flex-shrink: 0;
    }
    .section-count {
      color: var(--muted);
      font-size: .78rem;
      font-weight: 500;
      margin-left: auto;
      font-family: var(--font-sans);
      letter-spacing: .03em;
    }

    /* ── Score Row ── */
    .score-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .score-btn {
      padding: 12px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: .84rem;
      font-weight: 600;
      letter-spacing: .03em;
      transition: transform .2s var(--ease), box-shadow .2s var(--ease);
    }
    .score-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
    }
    .score-btn:active {
      transform: translateY(0);
    }
    .score-btn.mint   { background: var(--score-mint);   color: var(--score-mint-t); }
    .score-btn.yellow { background: var(--score-yellow); color: var(--score-yellow-t); }
    .score-btn.pink   { background: var(--score-pink);   color: var(--score-pink-t); }
    .score-btn.selected {
      box-shadow: inset 0 0 0 2px var(--accent-dark), 0 2px 8px rgba(74, 102, 89, .2);
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-style: italic;
    }

    .katex { font-size: 1em; }

    @media (max-width: 720px) {
      .card-grid { grid-template-columns: 1fr; }
      .topnav { padding: 12px 18px; }
      .brand-text { font-size: 1.05rem; }
      .sigma { font-size: 1.8rem; }
      .nav-btn { padding: 5px 10px; font-size: .72rem; }
    }
  </style>
</head>
<body>

  <header class="topnav">
    <div class="brand">
      <span class="logo">☁</span>
      <div>
        <div class="brand-text">数学 · 数学系考研</div>
        <small>数学分析 · 高等代数 · 考研真题分类</small>
      </div>
    </div>
    <div class="nav-right">
      <a class="nav-btn" href="math.html">📖 知识图谱</a>
      <a class="nav-btn" href="index.html">↩ 中枢</a>
      <span class="sigma">Σ</span>
    </div>
  </header>

  <main>
    <div class="mode-tabs" id="mode-tabs"></div>
    <div class="filter-chips" id="filter-chips"></div>
    <div class="filter-chips-secondary" id="section-chips"></div>
    <div id="card-grid"></div>
  </main>

  <script>
    const SCORE_KEY = 'math_practice_scores_v1';

    let katexReady = false;
    let currentMode = null;
    let currentFilter = 'ALL';

    Object.defineProperty(window, '__katexReady', {
      set(v) { katexReady = v; tryInit(); },
      get()  { return katexReady; },
      configurable: true
    });

    function tryInit() {
      if (!katexReady) return;
      if (typeof mathQuestionBank === 'undefined') {
        document.getElementById('card-grid').innerHTML =
          '<div class="empty">题库加载失败 ✗</div>';
        return;
      }
      const sources = [...new Set(mathQuestionBank.map(q => q.source).filter(Boolean))];
      currentMode = currentMode || sources[0] || null;
      render();
    }

    function render() {
      renderModeTabs();
      renderFilterChips();
      renderCards();
    }

    function renderModeTabs() {
      const sources = [...new Set(mathQuestionBank.map(q => q.source).filter(Boolean))];
      const box = document.getElementById('mode-tabs');
      box.innerHTML = '';
      if (sources.length === 0) { box.style.display = 'none'; return; }
      const icons = { '教材模式': '📚', '真题模式': '📖' };
      sources.forEach(src => {
        const btn = document.createElement('button');
        btn.className = 'mode-tab' + (src === currentMode ? ' active' : '');
        btn.innerHTML = (icons[src] || '📘') + '&nbsp;' + src;
        btn.onclick = () => {
          currentMode = src;
          currentFilter = 'ALL';
          render();
        };
        box.appendChild(btn);
      });
    }

    function renderFilterChips() {
      const modeItems = currentMode
        ? mathQuestionBank.filter(q => q.source === currentMode)
        : mathQuestionBank;
      const primaryBox   = document.getElementById('filter-chips');
      const secondaryBox = document.getElementById('section-chips');
      primaryBox.innerHTML = '';
      secondaryBox.innerHTML = '';

      function addChip(box, value, label, active) {
        const btn = document.createElement('button');
        btn.className = 'chip' + (active ? ' active' : '');
        btn.textContent = label;
        btn.onclick = () => { currentFilter = value; render(); };
        box.appendChild(btn);
      }

      if (currentMode === '教材模式') {
        // 当前选中的章节（ALL / 章 / 节 都要落到 "selectedChapter"）
        let selectedChapter = null;
        if (currentFilter !== 'ALL') {
          const m = currentFilter.match(/^(ma-c\d+)/);
          selectedChapter = m ? m[1] : null;
        }

        // 第一层：章节
        const chapters = new Set();
        modeItems.forEach(q => {
          const m = q.kp_id && q.kp_id.match(/^(ma-c\d+)/);
          if (m) chapters.add(m[1]);
        });
        const sortedChapters = [...chapters].sort(byNumericSuffix);

        addChip(primaryBox, 'ALL', '全部', currentFilter === 'ALL');
        sortedChapters.forEach(cid => {
          const node = findNode(cid);
          const short = node ? (node.title.split(/\s+/)[0] || node.title) : cid;
          addChip(primaryBox, cid, short, selectedChapter === cid);
        });

        // 第二层：小节（仅当某章已选中时渲染）
        if (selectedChapter) {
          const sections = new Set();
          modeItems.forEach(q => {
            const m = q.kp_id && q.kp_id.match(/^(ma-c\d+)-(s\d+)/);
            if (m && m[1] === selectedChapter) sections.add(`${m[1]}-${m[2]}`);
          });
          const sortedSections = [...sections].sort(byNumericSuffix);

          addChip(secondaryBox, selectedChapter, '全部小节', currentFilter === selectedChapter);
          sortedSections.forEach(sid => {
            const node = findNode(sid);
            const short = node ? (node.title.split(/\s+/)[0] || node.title) : sid;
            addChip(secondaryBox, sid, short, currentFilter === sid);
          });
        }
      } else {
        // 真题模式：话题标签（单层）
        const tagSet = new Set();
        modeItems.forEach(q => (q.tags || []).forEach(t => tagSet.add(t)));
        addChip(primaryBox, 'ALL', '全部', currentFilter === 'ALL');
        [...tagSet].forEach(tag => addChip(primaryBox, tag, tag, currentFilter === tag));
      }
    }

    function renderCards() {
      let items = currentMode
        ? mathQuestionBank.filter(q => q.source === currentMode)
        : mathQuestionBank.slice();

      if (currentFilter !== 'ALL') {
        if (currentMode === '教材模式') {
          items = items.filter(q => q.kp_id && q.kp_id.startsWith(currentFilter + '-'));
        } else {
          items = items.filter(q => Array.isArray(q.tags) && q.tags.includes(currentFilter));
        }
      }

      const root = document.getElementById('card-grid');
      root.innerHTML = '';
      root.className = '';

      if (items.length === 0) {
        root.innerHTML = '<div class="empty">暂无题目 — 该分类尚未录入题库。</div>';
        return;
      }

      if (currentMode === '教材模式') {
        renderGroupedByChapter(items, root);
      } else {
        const grid = document.createElement('div');
        grid.className = 'card-grid';
        items.forEach(q => grid.appendChild(buildCardWrap(q)));
        root.appendChild(grid);
      }
    }

    function renderGroupedByChapter(items, root) {
      // 先按章 -> 节聚合
      const byChapter = new Map();
      items.forEach(q => {
        const m = q.kp_id && q.kp_id.match(/^(ma-c\d+)-(s\d+)/);
        if (!m) return;
        const chId = m[1];
        const secId = `${m[1]}-${m[2]}`;
        if (!byChapter.has(chId)) byChapter.set(chId, new Map());
        const secMap = byChapter.get(chId);
        if (!secMap.has(secId)) secMap.set(secId, []);
        secMap.get(secId).push(q);
      });

      const sortedChapters = [...byChapter.keys()].sort(byNumericSuffix);
      sortedChapters.forEach(chId => {
        const chapterTitle = (findNode(chId) && findNode(chId).title) || chId;
        const chapterEl = document.createElement('section');
        chapterEl.className = 'chapter-group';
        chapterEl.innerHTML = `<h2 class="chapter-title">${chapterTitle}</h2>`;

        const secMap = byChapter.get(chId);
        const sortedSections = [...secMap.keys()].sort(byNumericSuffix);
        sortedSections.forEach(secId => {
          const sectionTitle = (findNode(secId) && findNode(secId).title) || secId;
          const secItems = secMap.get(secId);

          const secEl = document.createElement('div');
          secEl.className = 'section-group';
          secEl.innerHTML = `
            <h3 class="section-title">
              <span class="section-bar"></span>
              <span>${sectionTitle}</span>
              <span class="section-count">${secItems.length} 题</span>
            </h3>
          `;
          const grid = document.createElement('div');
          grid.className = 'card-grid';
          secItems.forEach(q => grid.appendChild(buildCardWrap(q)));
          secEl.appendChild(grid);
          chapterEl.appendChild(secEl);
        });

        root.appendChild(chapterEl);
      });
    }

    // 从 mathKnowledgeTree 按 id 查找节点（取 title）
    function findNode(id) {
      if (typeof mathKnowledgeTree === 'undefined') return null;
      function walk(node) {
        if (node.id === id) return node;
        if (node.children) {
          for (const c of node.children) {
            const hit = walk(c);
            if (hit) return hit;
          }
        }
        return null;
      }
      for (const root of mathKnowledgeTree) {
        const hit = walk(root);
        if (hit) return hit;
      }
      return null;
    }

    // 按 id 中的数字自然排序（ma-c2 < ma-c10；ma-c1-s2 < ma-c1-s10）
    function byNumericSuffix(a, b) {
      const numsA = (a.match(/\d+/g) || []).map(Number);
      const numsB = (b.match(/\d+/g) || []).map(Number);
      const n = Math.min(numsA.length, numsB.length);
      for (let i = 0; i < n; i++) {
        if (numsA[i] !== numsB[i]) return numsA[i] - numsB[i];
      }
      return numsA.length - numsB.length;
    }

    function buildCardWrap(q) {
      const wrap = document.createElement('div');
      wrap.className = 'qcard-wrap';

      const yearBadge = q.year
        ? `<span class="year-badge">${q.year}年</span>`
        : '<span></span>';
      const tagBadges = (q.tags || [])
        .map(t => `<span class="tag-chip">${t.startsWith('#') ? t : '#' + t}</span>`)
        .join('');

      const card = document.createElement('article');
      card.className = 'qcard-flip';
      card.innerHTML = `
        <div class="qcard-inner">
          <div class="card-face card-front">
            <div class="qcard-head">
              ${yearBadge}
              <div class="qcard-tags">${tagBadges}</div>
            </div>
            <div class="question" data-tex>${q.question || ''}</div>
            <div class="flip-hint">点击卡片翻面 →</div>
          </div>
          <div class="card-face card-back">
            <div class="back-answer" data-tex>${(q.answer || '').replace(/\n/g, '<br>')}</div>
            <div class="flip-hint-back">← 点击卡片翻回</div>
          </div>
        </div>
      `;

      const inner = card.querySelector('.qcard-inner');
      const front = card.querySelector('.card-front');
      const back  = card.querySelector('.card-back');

      function renderBackIfNeeded() {
        if (!back.dataset.rendered && window.renderMathInElement) {
          renderMathInElement(back.querySelector('.back-answer'), {
            delimiters: [
              { left: '$$', right: '$$', display: true },
              { left: '$',  right: '$',  display: false }
            ],
            throwOnError: false
          });
          back.dataset.rendered = '1';
        }
      }

      function isTextSelected() {
        const sel = window.getSelection && window.getSelection();
        return !!(sel && sel.toString().length > 0);
      }

      front.addEventListener('click', () => {
        if (isTextSelected()) return;
        renderBackIfNeeded();
        inner.classList.add('flipped');
      });
      back.addEventListener('click', () => {
        if (isTextSelected()) return;
        inner.classList.remove('flipped');
      });

      if (window.renderMathInElement) {
        renderMathInElement(front.querySelector('.question'), {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$',  right: '$',  display: false }
          ],
          throwOnError: false
        });
      }

      wrap.appendChild(card);

      const scoreRow = document.createElement('div');
      scoreRow.className = 'score-row';
      scoreRow.innerHTML = `
        <button class="score-btn mint"   data-score="3">秒杀 3分</button>
        <button class="score-btn yellow" data-score="2">瞄眼 2分</button>
        <button class="score-btn pink"   data-score="1">不会 1分</button>
      `;
      const saved = loadScore(q.id);
      scoreRow.querySelectorAll('.score-btn').forEach(btn => {
        const s = parseInt(btn.dataset.score, 10);
        if (saved === s) btn.classList.add('selected');
        btn.addEventListener('click', e => {
          e.stopPropagation();
          scoreRow.querySelectorAll('.score-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          saveScore(q.id, s);
        });
      });

      wrap.appendChild(scoreRow);
      return wrap;
    }

    function saveScore(qid, score) {
      try {
        const all = JSON.parse(localStorage.getItem(SCORE_KEY) || '{}');
        all[qid] = score;
        localStorage.setItem(SCORE_KEY, JSON.stringify(all));
      } catch (e) {}
    }
    function loadScore(qid) {
      try {
        const all = JSON.parse(localStorage.getItem(SCORE_KEY) || '{}');
        return all[qid];
      } catch (e) { return null; }
    }

    // 兜底：脚本加载顺序竞争
    window.addEventListener('load', () => {
      if (typeof renderMathInElement === 'function' && !katexReady) {
        katexReady = true;
        tryInit();
      }
    });
  </script>

</body>
