<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数学 · 数学系考研</title>

  <!-- KaTeX 渲染引擎 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
          onload="window.__katexReady = true; tryInit()"></script>

  <!-- 数据引擎 -->
  <script src="math_data.js"></script>
  <script src="math_practice.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #f5f0e8;
      --header-bg:    #6b8676;
      --header-text:  rgba(255, 255, 255, .95);
      --accent:       #5c7a6e;
      --accent-dark:  #4a6659;
      --accent-light: #e1ebe1;
      --card-bg:      #ffffff;
      --card-border:  #e8e0d0;
      --text:         #2c2c2c;
      --text-soft:    #5c5c5c;
      --muted:        #9a9a8a;
      --year-bg:      #f5e8c7;
      --year-text:    #a08040;
      --score-mint:   #d4ebd4;
      --score-mint-t: #4a7a4a;
      --score-yellow: #f5e8b8;
      --score-yellow-t: #9a7a2a;
      --score-pink:   #f5c8c8;
      --score-pink-t: #a04040;
    }

    html, body { height: 100%; }
    body {
      font-family: 'Noto Serif SC', 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      line-height: 1.7;
    }

    /* ── Top Header ── */
    .topnav {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 14px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand .logo {
      width: 48px;
      height: 48px;
      background: #ffffff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .1);
    }
    .brand-text {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: .04em;
      color: var(--header-text);
    }
    .brand small {
      display: block;
      font-size: .72rem;
      opacity: .75;
      font-family: system-ui, sans-serif;
      font-weight: 400;
      margin-top: 2px;
      letter-spacing: .02em;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .nav-btn {
      color: rgba(255, 255, 255, .85);
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, .25);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: .78rem;
      font-family: system-ui, sans-serif;
      transition: background .15s, border-color .15s;
    }
    .nav-btn:hover {
      background: rgba(255, 255, 255, .15);
      border-color: rgba(255, 255, 255, .45);
    }
    .sigma {
      font-size: 2.4rem;
      font-family: 'Times New Roman', 'STIX Two Math', serif;
      font-style: italic;
      color: rgba(255, 255, 255, .7);
      margin-left: 6px;
    }

    /* ── Main Layout ── */
    main {
      flex: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 48px;
      width: 100%;
    }

    /* ── Mode Tabs ── */
    .mode-tabs {
      display: flex;
      gap: 4px;
      background: #ffffff;
      border-radius: 14px;
      padding: 5px;
      width: fit-content;
      margin: 0 auto 22px;
      border: 1px solid var(--card-border);
      box-shadow: 0 1px 3px rgba(0, 0, 0, .04);
    }
    .mode-tab {
      padding: 9px 24px;
      border: none;
      background: transparent;
      border-radius: 10px;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      font-size: .92rem;
      color: var(--text-soft);
      font-weight: 600;
      transition: all .2s;
    }
    .mode-tab:hover { color: var(--accent); }
    .mode-tab.active {
      background: var(--accent);
      color: #ffffff;
    }

    /* ── Filter Chips ── */
    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
      justify-content: center;
    }
    .chip {
      padding: 6px 14px;
      border-radius: 999px;
      background: var(--accent-light);
      color: var(--accent-dark);
      border: 1px solid transparent;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      font-size: .82rem;
      font-weight: 500;
      transition: all .15s;
    }
    .chip:hover {
      background: #d4e4d4;
      border-color: var(--accent);
    }
    .chip.active {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }

    /* ── Card Grid ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
      gap: 24px;
    }

    .qcard-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .qcard {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 22px 26px;
      cursor: pointer;
      transition: box-shadow .2s, border-color .2s;
    }
    .qcard:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 14px rgba(0, 0, 0, .06);
    }

    .qcard-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .year-badge {
      background: var(--year-bg);
      color: var(--year-text);
      padding: 3px 11px;
      border-radius: 5px;
      font-size: .78rem;
      font-weight: 700;
      font-family: 'Times New Roman', serif;
      letter-spacing: .02em;
    }
    .qcard-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag-chip {
      color: var(--muted);
      font-size: .74rem;
      font-family: system-ui, sans-serif;
    }

    .question {
      font-size: 1rem;
      color: var(--text);
      line-height: 1.85;
      min-height: 120px;
    }

    .qcard-foot {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #f5f0e8;
      text-align: right;
      color: var(--muted);
      font-size: .82rem;
      font-family: system-ui, sans-serif;
    }

    .qcard-answer {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px dashed var(--card-border);
      line-height: 1.85;
      color: var(--text-soft);
      display: none;
      font-size: .95rem;
    }
    .qcard.revealed .qcard-answer { display: block; }
    .qcard.revealed .qcard-foot { display: none; }

    .qcard-answer strong { color: var(--accent-dark); }
    .qcard-answer table {
      border-collapse: collapse;
      margin: 10px 0;
      font-size: .9rem;
    }
    .qcard-answer th, .qcard-answer td {
      border: 1px solid var(--card-border);
      padding: 6px 12px;
    }
    .qcard-answer th { background: var(--accent-light); color: var(--accent-dark); }

    /* ── Score Row ── */
    .score-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .score-btn {
      padding: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      font-size: .82rem;
      font-weight: 600;
      transition: transform .1s, box-shadow .2s;
    }
    .score-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 6px rgba(0, 0, 0, .08);
    }
    .score-btn.mint   { background: var(--score-mint);   color: var(--score-mint-t); }
    .score-btn.yellow { background: var(--score-yellow); color: var(--score-yellow-t); }
    .score-btn.pink   { background: var(--score-pink);   color: var(--score-pink-t); }
    .score-btn.selected {
      box-shadow: inset 0 0 0 2px var(--accent-dark);
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-style: italic;
    }

    .katex { font-size: 1em; }

    @media (max-width: 720px) {
      .card-grid { grid-template-columns: 1fr; }
      .topnav { padding: 12px 18px; }
      .brand-text { font-size: 1.05rem; }
      .sigma { font-size: 1.8rem; }
      .nav-btn { padding: 5px 10px; font-size: .72rem; }
    }
  </style>
</head>
<body>

  <header class="topnav">
    <div class="brand">
      <span class="logo">☁</span>
      <div>
        <div class="brand-text">数学 · 数学系考研</div>
        <small>数学分析 · 高等代数 · 考研真题分类</small>
      </div>
    </div>
    <div class="nav-right">
      <a class="nav-btn" href="math.html">📖 知识图谱</a>
      <a class="nav-btn" href="index.html">↩ 中枢</a>
      <span class="sigma">Σ</span>
    </div>
  </header>

  <main>
    <div class="mode-tabs" id="mode-tabs"></div>
    <div class="filter-chips" id="filter-chips"></div>
    <div class="card-grid" id="card-grid"></div>
  </main>

  <script>
    const SCORE_KEY = 'math_practice_scores_v1';

    let katexReady = false;
    let currentMode = null;
    let currentFilter = 'ALL';

    Object.defineProperty(window, '__katexReady', {
      set(v) { katexReady = v; tryInit(); },
      get()  { return katexReady; },
      configurable: true
    });

    function tryInit() {
      if (!katexReady) return;
      if (typeof mathQuestionBank === 'undefined') {
        document.getElementById('card-grid').innerHTML =
          '<div class="empty">题库加载失败 ✗</div>';
        return;
      }
      const sources = [...new Set(mathQuestionBank.map(q => q.source).filter(Boolean))];
      currentMode = currentMode || sources[0] || null;
      render();
    }

    function render() {
      renderModeTabs();
      renderFilterChips();
      renderCards();
    }

    function renderModeTabs() {
      const sources = [...new Set(mathQuestionBank.map(q => q.source).filter(Boolean))];
      const box = document.getElementById('mode-tabs');
      box.innerHTML = '';
      if (sources.length === 0) { box.style.display = 'none'; return; }
      const icons = { '教材模式': '📚', '真题模式': '📖' };
      sources.forEach(src => {
        const btn = document.createElement('button');
        btn.className = 'mode-tab' + (src === currentMode ? ' active' : '');
        btn.innerHTML = (icons[src] || '📘') + '&nbsp;' + src;
        btn.onclick = () => {
          currentMode = src;
          currentFilter = 'ALL';
          render();
        };
        box.appendChild(btn);
      });
    }

    function renderFilterChips() {
      const modeItems = currentMode
        ? mathQuestionBank.filter(q => q.source === currentMode)
        : mathQuestionBank;
      const tagSet = new Set();
      modeItems.forEach(q => {
        (q.tags || []).forEach(t => tagSet.add(t));
      });
      const tags = [...tagSet];
      const box = document.getElementById('filter-chips');
      box.innerHTML = '';
      const all = document.createElement('button');
      all.className = 'chip' + (currentFilter === 'ALL' ? ' active' : '');
      all.textContent = '全部';
      all.onclick = () => { currentFilter = 'ALL'; render(); };
      box.appendChild(all);
      tags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'chip' + (currentFilter === tag ? ' active' : '');
        btn.textContent = tag;
        btn.onclick = () => { currentFilter = tag; render(); };
        box.appendChild(btn);
      });
    }

    function renderCards() {
      let items = currentMode
        ? mathQuestionBank.filter(q => q.source === currentMode)
        : mathQuestionBank.slice();
      if (currentFilter !== 'ALL') {
        items = items.filter(q => Array.isArray(q.tags) && q.tags.includes(currentFilter));
      }
      const grid = document.getElementById('card-grid');
      grid.innerHTML = '';
      if (items.length === 0) {
        grid.innerHTML = '<div class="empty">暂无题目 — 该分类尚未录入题库。</div>';
        return;
      }
      items.forEach(q => grid.appendChild(buildCardWrap(q)));
    }

    function buildCardWrap(q) {
      const wrap = document.createElement('div');
      wrap.className = 'qcard-wrap';

      const card = document.createElement('article');
      card.className = 'qcard';

      const yearBadge = q.year
        ? `<span class="year-badge">${q.year}年</span>`
        : '<span></span>';
      const tagBadges = (q.tags || [])
        .map(t => `<span class="tag-chip">${t.startsWith('#') ? t : '#' + t}</span>`)
        .join('');

      card.innerHTML = `
        <div class="qcard-head">
          ${yearBadge}
          <div class="qcard-tags">${tagBadges}</div>
        </div>
        <div class="question" data-tex>${q.question || ''}</div>
        <div class="qcard-foot">点击查看解答 →</div>
        <div class="qcard-answer" data-tex>${(q.answer || '').replace(/\n/g, '<br>')}</div>
      `;

      card.onclick = () => {
        const willReveal = !card.classList.contains('revealed');
        card.classList.toggle('revealed');
        if (willReveal && window.renderMathInElement) {
          renderMathInElement(card.querySelector('.qcard-answer'), {
            delimiters: [
              { left: '$$', right: '$$', display: true },
              { left: '$',  right: '$',  display: false }
            ],
            throwOnError: false
          });
        }
      };

      if (window.renderMathInElement) {
        renderMathInElement(card.querySelector('.question'), {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$',  right: '$',  display: false }
          ],
          throwOnError: false
        });
      }

      wrap.appendChild(card);

      const scoreRow = document.createElement('div');
      scoreRow.className = 'score-row';
      scoreRow.innerHTML = `
        <button class="score-btn mint"   data-score="3">秒杀 3分</button>
        <button class="score-btn yellow" data-score="2">瞄眼 2分</button>
        <button class="score-btn pink"   data-score="1">不会 1分</button>
      `;
      const saved = loadScore(q.id);
      scoreRow.querySelectorAll('.score-btn').forEach(btn => {
        const s = parseInt(btn.dataset.score, 10);
        if (saved === s) btn.classList.add('selected');
        btn.addEventListener('click', e => {
          e.stopPropagation();
          scoreRow.querySelectorAll('.score-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          saveScore(q.id, s);
        });
      });

      wrap.appendChild(scoreRow);
      return wrap;
    }

    function saveScore(qid, score) {
      try {
        const all = JSON.parse(localStorage.getItem(SCORE_KEY) || '{}');
        all[qid] = score;
        localStorage.setItem(SCORE_KEY, JSON.stringify(all));
      } catch (e) {}
    }
    function loadScore(qid) {
      try {
        const all = JSON.parse(localStorage.getItem(SCORE_KEY) || '{}');
        return all[qid];
      } catch (e) { return null; }
    }

    // 兜底：脚本加载顺序竞争
    window.addEventListener('load', () => {
      if (typeof renderMathInElement === 'function' && !katexReady) {
        katexReady = true;
        tryInit();
      }
    });
  </script>

</body>
</html>
