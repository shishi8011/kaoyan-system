<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数学刷题靶场</title>

  <!-- KaTeX 渲染引擎 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
          onload="window.__katexReady = true; tryInit()"></script>

  <!-- 数据引擎 -->
  <script src="math_data.js"></script>
  <script src="math_practice.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0d1117;
      --panel:    #161b22;
      --border:   #30363d;
      --accent:   #58a6ff;
      --ok:       #7ee787;
      --warn:     #f0883e;
      --text:     #c9d1d9;
      --muted:    #8b949e;
    }

    html, body { height: 100%; }
    body {
      font-family: 'Courier New', Courier, monospace;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Top Nav ── */
    nav.topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      background: #010409;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .brand {
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 0 6px rgba(88,166,255,.35);
    }
    .nav-links { display: flex; gap: 10px; }
    .nav-btn {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: .85rem;
      transition: all .2s;
    }
    .nav-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 10px rgba(88,166,255,.2);
    }

    /* ── Main Layout ── */
    main {
      flex: 1;
      max-width: 960px;
      margin: 32px auto;
      padding: 0 20px;
      width: 100%;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      color: var(--muted);
      font-size: .85rem;
    }
    .status-bar .count { color: var(--ok); }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .filter-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: .8rem;
      transition: all .2s;
    }
    .filter-btn:hover { border-color: var(--accent); }
    .filter-btn.active {
      background: var(--accent);
      color: #0d1117;
      border-color: var(--accent);
    }

    /* ── Question Card ── */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 16px;
      transition: border-color .2s;
    }
    .card:hover { border-color: var(--accent); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px dashed var(--border);
      flex-wrap: wrap;
      gap: 8px;
    }
    .kp-link {
      color: var(--accent);
      font-size: .82rem;
      font-weight: 700;
      text-decoration: none;
    }
    .kp-link:hover { text-decoration: underline; }
    .source-tag {
      background: rgba(126,231,135,.12);
      color: var(--ok);
      padding: 2px 10px;
      border-radius: 4px;
      font-size: .72rem;
      font-weight: 700;
    }

    .question, .answer {
      line-height: 1.8;
      font-family: 'Georgia', serif;
    }
    .question { color: var(--text); }
    .answer {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      display: none;
    }
    .answer.visible { display: block; }
    .answer table {
      border-collapse: collapse;
      margin: 10px 0;
    }
    .answer th, .answer td {
      border: 1px solid var(--border);
      padding: 6px 10px;
    }
    .answer th { background: rgba(88,166,255,.1); }

    .reveal-btn {
      margin-top: 16px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 8px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: .82rem;
      transition: all .2s;
    }
    .reveal-btn:hover {
      background: var(--accent);
      color: #0d1117;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    /* KaTeX size tweak for dark theme */
    .katex { color: var(--text); }
  </style>
</head>
<body>

  <nav class="topbar">
    <div class="brand">[ PRACTICE.RANGE ] 数学刷题靶场</div>
    <div class="nav-links">
      <a class="nav-btn" href="math.html">📖 知识图谱</a>
      <a class="nav-btn" href="index.html">↩ 返回中枢</a>
    </div>
  </nav>

  <main>
    <div class="status-bar">
      <div>题库加载状态：<span id="load-status">正在初始化引擎…</span></div>
      <div>当前题数：<span class="count" id="question-count">0</span></div>
    </div>

    <div class="filters" id="filters"></div>

    <div id="question-list"></div>
  </main>

  <script>
    let katexReady = false;
    let dataReady  = false;
    let currentFilter = 'ALL';

    window.__katexReady = false;
    Object.defineProperty(window, '__katexReady', {
      set(v) { katexReady = v; tryInit(); },
      get()  { return katexReady; },
      configurable: true
    });

    function tryInit() {
      if (!katexReady) return;
      if (typeof mathQuestionBank === 'undefined' || typeof mathKnowledgeTree === 'undefined') {
        document.getElementById('load-status').textContent = '数据文件缺失 ✗';
        return;
      }
      dataReady = true;
      document.getElementById('load-status').textContent = '就绪 ✓';
      renderFilters();
      renderQuestions();
    }

    function kpTitle(kpId) {
      function walk(node) {
        if (node.id === kpId) return node.title;
        if (node.children) for (const c of node.children) {
          const hit = walk(c);
          if (hit) return hit;
        }
        return null;
      }
      for (const root of mathKnowledgeTree) {
        const hit = walk(root);
        if (hit) return hit;
      }
      return '(未找到知识点)';
    }

    function renderFilters() {
      const sources = ['ALL', ...new Set(mathQuestionBank.map(q => q.source).filter(Boolean))];
      const box = document.getElementById('filters');
      box.innerHTML = '';
      sources.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (s === currentFilter ? ' active' : '');
        btn.textContent = s === 'ALL' ? '全部' : s;
        btn.onclick = () => { currentFilter = s; renderFilters(); renderQuestions(); };
        box.appendChild(btn);
      });
    }

    function renderQuestions() {
      const list = document.getElementById('question-list');
      list.innerHTML = '';

      const filtered = currentFilter === 'ALL'
        ? mathQuestionBank
        : mathQuestionBank.filter(q => q.source === currentFilter);

      document.getElementById('question-count').textContent = filtered.length;

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">暂无题目 — 快去补充题库吧。</div>';
        return;
      }

      filtered.forEach((q, idx) => {
        const card = document.createElement('article');
        card.className = 'card';
        const kpTitleText = q.kp_id ? kpTitle(q.kp_id) : '';
        card.innerHTML = `
          <div class="card-header">
            <a class="kp-link" href="math.html#${q.kp_id || ''}">› ${kpTitleText}</a>
            <span class="source-tag">${q.source || '未分类'}</span>
          </div>
          <div class="question" data-tex>Q${idx + 1}. ${q.question || ''}</div>
          <button class="reveal-btn">显示答案</button>
          <div class="answer" data-tex>${(q.answer || '').replace(/\n/g, '<br>')}</div>
        `;
        const btn = card.querySelector('.reveal-btn');
        const ans = card.querySelector('.answer');
        btn.onclick = () => {
          ans.classList.toggle('visible');
          btn.textContent = ans.classList.contains('visible') ? '隐藏答案' : '显示答案';
          if (ans.classList.contains('visible') && window.renderMathInElement) {
            renderMathInElement(ans, {
              delimiters: [
                { left: '$$', right: '$$', display: true },
                { left: '$',  right: '$',  display: false }
              ],
              throwOnError: false
            });
          }
        };
        list.appendChild(card);

        if (window.renderMathInElement) {
          renderMathInElement(card.querySelector('.question'), {
            delimiters: [
              { left: '$$', right: '$$', display: true },
              { left: '$',  right: '$',  display: false }
            ],
            throwOnError: false
          });
        }
      });
    }

    // 兜底：若 KaTeX 已加载但 tryInit 未触发（脚本顺序竞争）
    window.addEventListener('load', () => {
      if (typeof renderMathInElement === 'function' && !dataReady) {
        katexReady = true;
        tryInit();
      }
    });
  </script>

</body>
</html>
